<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" role="img" aria-label="Banner Taller CUDA">
  <defs>
    <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="45%" stop-color="#123c69"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1200" height="320" rx="28" fill="url(#g)"/>

  <g filter="url(#shadow)">
    <rect x="70" y="70" width="210" height="170" rx="22" fill="#111827" stroke="#22c55e" stroke-width="4"/>
    <rect x="105" y="105" width="140" height="100" rx="14" fill="#1f2937" stroke="#38bdf8" stroke-width="3"/>
    <circle cx="125" cy="220" r="8" fill="#22c55e"/>
    <circle cx="165" cy="220" r="8" fill="#22c55e"/>
    <circle cx="205" cy="220" r="8" fill="#22c55e"/>
    <path d="M280 120 H350 M280 160 H350 M280 200 H350" stroke="#22c55e" stroke-width="8" stroke-linecap="round"/>
  </g>

  <text x="390" y="120" fill="#ffffff" font-size="52" font-family="Segoe UI, Arial, sans-serif" font-weight="700">
    Taller CUDA
  </text>
  <text x="390" y="175" fill="#d1fae5" font-size="28" font-family="Segoe UI, Arial, sans-serif">
    Programación Paralela y Computación Distribuida
  </text>
  <text x="390" y="225" fill="#bfdbfe" font-size="24" font-family="Segoe UI, Arial, sans-serif">
    C CPU · CUDA C · Google Colab · NVIDIA T4
  </text>

  <g opacity="0.9">
    <rect x="940" y="70" width="50" height="50" rx="8" fill="#22c55e"/>
    <rect x="1005" y="70" width="50" height="50" rx="8" fill="#38bdf8"/>
    <rect x="1070" y="70" width="50" height="50" rx="8" fill="#a3e635"/>

    <rect x="940" y="135" width="50" height="50" rx="8" fill="#38bdf8"/>
    <rect x="1005" y="135" width="50" height="50" rx="8" fill="#a3e635"/>
    <rect x="1070" y="135" width="50" height="50" rx="8" fill="#22c55e"/>

    <rect x="940" y="200" width="50" height="50" rx="8" fill="#a3e635"/>
    <rect x="1005" y="200" width="50" height="50" rx="8" fill="#22c55e"/>
    <rect x="1070" y="200" width="50" height="50" rx="8" fill="#38bdf8"/>
  </g>
</svg>
