<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 520" role="img" aria-label="Flujo de memoria CUDA">
  <defs>
    <style>
      .bg { fill: #fafcff }
      .title { font-family: 'Segoe UI', Arial, sans-serif; font-size:34px; font-weight:700; fill:#0f172a }
      .section-title { font-family: 'Segoe UI', Arial, sans-serif; font-size:28px; font-weight:700 }
      .mono { font-family: monospace; font-size:20px; fill:#0f172a }
      .note { font-family: 'Segoe UI', Arial, sans-serif; font-size:20px; fill:#334155 }
      .box { rx:20 }
    </style>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.12"/>
    </filter>

    <marker id="arrow" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto">
      <path d="M2,2 L12,7 L2,12 Z" fill="#0f172a"/>
    </marker>
  </defs>

  <rect width="1100" height="520" rx="24" class="bg"/>
  <text x="50" y="60" class="title">Flujo de memoria en CUDA</text>

  <g filter="url(#shadow)">
    <rect x="70" y="120" width="360" height="290" rx="24" fill="#eff6ff" stroke="#2563eb" stroke-width="3"/>
    <rect x="670" y="120" width="360" height="290" rx="24" fill="#ecfdf5" stroke="#16a34a" stroke-width="3"/>
  </g>

  <text x="115" y="165" class="section-title" fill="#1d4ed8">Host / CPU</text>
  <text x="115" y="210" class="mono">malloc()</text>
  <text x="115" y="244" class="mono">h_A, h_B, h_C</text>
  <text x="115" y="278" class="mono">h_R</text>

  <text x="715" y="165" class="section-title" fill="#15803d">Device / GPU</text>
  <text x="715" y="210" class="mono">cudaMalloc()</text>
  <text x="715" y="244" class="mono">d_A, d_B, d_C</text>
  <text x="715" y="278" class="mono">d_R</text>
  <text x="715" y="328" class="mono">kernel&lt;&lt;&lt;grid, block&gt;&gt;&gt;</text>

  <path d="M440 220 H655" stroke="#0f172a" stroke-width="5" marker-end="url(#arrow)"/>
  <text x="465" y="205" class="mono">cudaMemcpy H→D</text>

  <path d="M655 330 H440" stroke="#0f172a" stroke-width="5" marker-end="url(#arrow)"/>
  <text x="465" y="360" class="mono">cudaMemcpy D→H</text>

  <text x="95" y="465" class="note">1. Reservar memoria · 2. Copiar datos · 3. Ejecutar kernel · 4. Copiar resultado · 5. Liberar memoria</text>
</svg>
